<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/fontawesome.min.css"
        integrity="sha512-M5Kq4YVQrjg5c2wsZSn27Dkfm/2ALfxmun0vUE3mPiJyK53hQBHYCVAtvMYEC7ZXmYLg8DVG4tF8gD27WmDbsg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css"
        integrity="sha512-WxpJXPm/Is1a/dzEdhdaoajpgizHQimaLGL/QqUIAjIihlQqlPQb1V9vkGs9+VzXD7rgI6O+UsSKl4u5K36Ydw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/solid.min.css"
        integrity="sha512-EHa6vH03/Ty92WahM0/tet1Qicl76zihDCkBnFhN3kFGQkC+mc86d7V+6y2ypiLbk3h0beZAGdUpzfMcb06cMg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

    <title>Recipes</title>
    <style>
        :root {
            --color-primary: #2B324F;
            --color-primary-hover: #2B3D4F;
            --color-primary-dark: #2F2B4F;
            --color-primary-dark-hover: #37315f;
            --color-primary-light: #a9f1e8;
            --color-primary-light-hover: #77CCC0;

            --color-white: #fff;
            --color-off-white: #F9F9F6;
            --color-black: #000;

            --color-dark-text: #444;
            --color-info-light: #cce5ff;
            --color-debug-light: #cce5ff;
            --color-success-light: #d4edda;
            --color-alert-light: #fff3cd;
            --color-warning-light: #fff3cd;
            --color-error-light: #f8d7da;

            --color-info-dark: #4d86c4;
            --color-debug-dark: #4d86c4;
            --color-success-dark: #4a9c5d;
            --color-alert-dark: #927f40;
            --color-warning-dark: #927f40;
            --color-error-dark: #da525d;

            --color-gray-0: #f9f9f9;
            --color-gray-1: #e0e0e0;
            --color-gray-2: #c7c7c7;
            --color-gray-3: #aeaeae;
            --color-gray-4: #959595;
            --color-gray-5: #7d7d7d;
            --color-gray-6: #646464;
            --color-gray-7: #4b4b4b;
            --color-gray-8: #323232;
            --color-gray-9: #191919;

            --font-primary: sans-serif;
            --font-headings: 'Roboto Slab', serif;

            --spacing-gutter-medium: 3rem;
            --spacing-gutter-large: 4rem;
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 62%;
        }

        body {
            font-size: 1.6rem;
            font-family: var(--font-primary);
            background-color: var(--color-gray-0);
            color: var(--color-off-white);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-headings);
        }

        .container {
            max-width: 144rem;
            margin: 0 auto;
            padding: var(--spacing-gutter-medium);
        }

        .main-header-container {
            background: var(--color-primary);
            box-shadow: 1px 1px 10px var(--color-gray-8);
        }

        .main-logo {
            font-size: 4rem;
            color: var(--color-off-white);
            text-decoration: none;
            display: flex;
            flex-flow: row nowrap;
            align-items: center;
            justify-content: center;
            width: fit-content;
            margin: 0 auto;
        }

        .main-logo-icon {
            margin-right: 1.5rem;
        }

        .search-form {
            border: 2px solid var(--color-primary-dark);
            max-width: 64rem;
            margin: 0 auto;
            border-radius: 15px;
            position: relative;
            transition: box-shadow 0.2s ease;
        }

        .search-input,
        .search-button {
            border: none;
            background: none;
            outline: none;
            padding: 1rem;
        }

        .search-input {
            width: 100%;
            padding-right: var(--spacing-gutter-medium);
        }

        .search-button {
            position: absolute;
            top: 0;
            right: 0;
            border-radius: 15px;
        }

        .search-button:hover {
            cursor: pointer;
            color: var(--color-primary-dark);
        }

        .search-form:focus-within {
            box-shadow: 1px 1px 10px var(--color-primary-dark);
            background: var(--color-off-white);
        }

        .search-form:focus-within .search-button {
            color: var(--color-primary-dark);
        }

        .main-content {
            padding-top: 0;
        }

        .main-content-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: var(--spacing-gutter-large);
        }

        .recipe {
            background: var(--color-primary);
            box-shadow: -5px 5px 10px var(--color-gray-5);
            transform: scale(1);
            transition: all 300ms ease-in-out;
            border-radius: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        .recipe img {
            max-width: 100%;
        }

        .recipe-list-item {
            max-width: 64rem;           
        }

        .recipe-list-item:hover {
            transform: scale(1.02);
            box-shadow: -8px 8px 18px var(--color-gray-6);
        }

        .recipe-title-container {
            padding: var(--spacing-gutter-medium);
            padding-bottom: 2rem;
        }

        .recipe-author {
            color: var(--color-primary-dark);
            padding: 0 var(--spacing-gutter-medium);
        }

        .recipe-author-item {
            color: var(--color-gray-3);
            margin-right: 1rem;
        }

        .recipe-author a {
            color: var(--color-primary-light);
            text-decoration: none;
            transition: all 300ms ease-in-out;
        }

        .recipe-author a:hover {
            color: var(--color-primary-light-hover);
            text-decoration: underline;
        }

        .recipe-content {
            padding: var(--spacing-gutter-medium);
            padding-top: 2rem;
        }

        .recipe-meta-container {
            display: flex;
            flex-flow: row wrap;
            padding: var(--spacing-gutter-medium);
            background-color: var(--color-gray-1);
        }

        .recipe-meta {
            display: flex;
            flex-flow: column nowrap;
            flex-shrink: 1;
            flex-grow: 1;
            text-align: center;
            color: var(--color-primary);
        }

        .recipe-meta-title {
            font-size: 1.6rem;
        }

        .recipe-footer a{
            background: var(--color-primary-dark);
            display: block;
            flex-flow: row nowrap;
            color: var(--color-off-white);
            text-decoration: none;
            text-align: center;
            padding: 1.5rem var(--spacing-gutter-medium);
            transition: all 300ms ease-in-out;
        }
        
        .recipe-footer a:hover{
            background: var(--color-primary-dark-hover);
        }
    </style>
</head>
